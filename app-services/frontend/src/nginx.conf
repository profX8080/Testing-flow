# Custom nginx config for the frontend service
# Listens on port 8080 (non-root cannot use port 80)
# Proxies /api/* requests to the api service inside the cluster

server {
    listen 8080;
    server_name _;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location /api/ {
        resolver 169.254.20.10 valid=10s ipv6=off;
        set $api_upstream http://api-svc:8080;
        proxy_pass         $api_upstream/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_offline;
    }

    location @api_offline {
        default_type application/json;
        return 200 '{"status":"offline","message":"API not reachable. Expected when running outside EKS.","data":[{"id":1,"name":"Local Dummy Item 1"},{"id":2,"name":"Local Dummy Item 2"}]}';
    }
}