# Custom nginx config for the frontend service
# Listens on port 8080 (non-root cannot use port 80)
# Proxies /api/* requests to the api service inside the cluster

server {
    listen 8080;
    server_name _;

    # Serve static HTML files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the api service
    # In the cluster: api-svc resolves via Kubernetes DNS
    location /api/ {
        proxy_pass         http://api-svc:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Health check endpoint for readiness/liveness probes
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
